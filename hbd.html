<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=1, minimum-scale=1, maximum-scale=5" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Happy Birthday</title>
  <meta name="description" content="Happy Birthday" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/typeit@8.7.0/dist/index.umd.js"></script>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
        "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.6.0/build/index.module.js",
        "three-bvh-csg": "https://unpkg.com/three-bvh-csg@0.0.7/build/index.module.js"
      }
    }
  </script>

  <style>
    :root {
      --warna-bg: rgba(0, 0, 0, 0.3);
      --tombol-teks: #fff;
      --tombol-bingkai: #fff;
      --bingkai: 18px;
      --gaya-font: "Nunito Sans", sans-serif;
      --gaya-font2: "Caveat", cursive;
    }
    @keyframes fanim {
      0% { background-position: 0% 0%; }
      25% { background-position: 100% 100%; }
      50% { background-position: 0% 100%; }
      75% { background-position: 50% 50%; }
      100% { background-position: 0% 0%; }
    }
    body {
      background-color: #000;
      font-family: var(--gaya-font);
      padding: 20px 25px;
      -webkit-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    a { text-decoration: none; }

    #bodyblur {
      animation: jj 7s infinite;
      opacity: 0.5;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.3);
      transition: all 1s ease;
    }
    #bgwallpaper {
      width: 100%;
      height: 100%;
      transform: scale(1);
      transition: all 1.7s ease;
    }
    #beneranblur {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.3);
      transition: all 3s ease;
    }

    @keyframes jj {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    @keyframes rts {
      from { transform: scale(0.1); }
      to { transform: scale(1); }
    }
    @keyframes rto {
      from { transform: scale(1); }
      to { transform: scale(1.1); }
    }
    @keyframes aniopa {
      0% { transform: scale(1); }
      50% { transform: scale(0.75); }
      100% { transform: scale(1); }
    }
    @keyframes rtf {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes rt {
      from { transform: scale(0.9); }
      to { transform: scale(1); }
    }
    @keyframes kont {
      0% { left: -1px; top: -3px; }
      50% { left: 1px; top: 3px; }
      100% { left: -1px; top: -3px; }
    }

    blockquote {
      position: absolute;
      opacity: 0;
      visibility: hidden;
      transform: scale(0.1);
      transition: all 0.7s ease;
      margin-left: 0;
      margin-right: 0;
      color: var(--tombol-teks);
      text-shadow: 0px 2px 2px rgba(0, 0, 0, 0.8);
      width: 400px;
      text-align: center;
      line-height: 1.3em;
      padding: 0;
    }
    blockquote p {
      font-size: 15px;
      font-weight: 400;
      line-height: 1.5em;
      transition: all 0.5s ease;
      margin-left: 0;
      margin-right: 0;
    }
    blockquote p:not(#kalimat, #judulAkhir) { display: none; }
    #judulAkhir, blockquote p span.ft {
      font-family: var(--gaya-font2);
      font-size: 20px;
      font-weight: 700;
    }
    #judulAkhir {
      font-size: 22px;
      position: absolute;
      opacity: 0;
      transform: scale(0);
      transition: all 0.8s ease;
    }

    #slider {
      margin-top: 40px;
      position: absolute;
      opacity: 0;
      transform: scale(0);
      transition: all 1s ease;
      display: flex;
      flex-wrap: nowrap;
      align-items: flex-start;
      justify-content: flex-start;
      max-width: 500px;
      overflow-y: hidden;
      overflow-x: hidden;
      scroll-behavior: smooth;
      scroll-snap-type: x mandatory;
      -ms-overflow-style: none;
      -webkit-overflow-scrolling: touch;
    }
    #slider div {
      background: rgba(255, 255, 255, 0.147);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 0.5rem;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
      display: block;
      flex-wrap: nowrap;
      text-align: center;
      line-height: 1.4em;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 99%;
      margin: 0 15px 0 0;
      padding: 15px 0;
      scroll-snap-align: center;
    }
    #slider div, #psn {
      color: white;
      text-shadow: 0px 2px 2px rgba(0, 0, 0, 0.8);
      min-height: 150px;
    }
    #slider > *:last-child { margin-right: 0; }
    #slider:after {
      content: "";
      display: block;
      flex-shrink: 0;
      align-self: stretch;
      padding-left: 20px;
    }
    #slider div b { font-size: 15px; font-weight: 700; }
    #slider div b.ft { font-family: var(--gaya-font2); font-size: 20px; }
    #slider div img {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      border-radius: 12px;
    }
    #fotolove {
      border-radius: 50%;
      transition: all 0.3s ease;
    }
    #fotolove:hover { transform: scale(0.8); }

    #button {
      position: relative;
      opacity: 0;
      display: flex;
      align-items: left;
      list-style: none;
      transform: scale(0.1);
      transition: all 0.7s ease;
    }
    #button a {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      margin: 12px 0;
      transition: all 0.2s ease;
      padding: 10px;
      outline: 0;
      border-radius: 8px;
      line-height: 15px;
      background: rgba(0, 0, 0, 0.5);
      color: white;
      font-size: 12px;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      z-index: 1;
    }
    #button a:hover { transform: scale(0.9); opacity: 0.98; }

    #content {
      position: relative;
      opacity: 0;
      margin-top: 50px;
      width: 100%;
      height: 180px;
      transition: all 0.7s ease;
    }
    #content > * {
      display: flex;
      align-items: center;
      text-align: center;
      justify-content: center;
      margin-top: 1px;
    }
    .stickerswrapper > img {
      display: none;
      background: rgba(255,255,255,0.5);
      box-shadow: 0 4px 30px rgba(255,255,255,0.2);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,1);
      border-radius: 50%;
      padding: 10px;
      width: 92px;
      height: 92px;
    }
    #fotostiker {
      opacity: 0.1;
      transition: all 0.7s ease;
      transform: scale(0.1);
    }

    .fa-heart {
      opacity: 0.3;
      color: white;
      font-size: 20px;
      position: absolute;
      animation: heartMove linear 1;
      top: -10vh;
      z-index: 0;
    }
    @keyframes heartMove {
      0% { transform: translateY(-10vh); }
      100% { transform: translateY(100vh); }
    }
    .sembunyi, #kado2, #kado3 { display: none !important; }

    #bgKado {
      position: absolute;
      z-index: 20;
      width: 99%;
      height: 99%;
      top: 50%;
      left: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.2);
      box-shadow: 0 4px 30px rgba(0,0,0,0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
    }
    #kadoIn {
      cursor: pointer;
      width: 200px;
      height: 200px;
    }
    #kolombaru {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      list-style: none;
    }

    .swal2-modal > * { font-family: var(--gaya-font); font-size: 16px; color: white; }
    .swal2-title { line-height: 1.3em; font-size: 17px; text-align: center; padding: 15px 30px 0 30px; }
    .swal2-timer-progress-bar-container > * { opacity: 0.7; background: #00b6ff; margin: 0 2px; }
    .swal2-modal {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      box-shadow: 0 4px 30px rgba(255,255,255,0.3);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 14px;
      max-width: 280px;
      top: -60px;
    }
    .swal2-image {
      background: rgba(255,255,255,0.5);
      box-shadow: 0 4px 30px rgba(255,255,255,0.3);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      padding: 10px;
    }
    .swal2-styled.swal2-confirm, .swal2-styled.swal2-cancel {
      position: relative;
      background-color: #4839eb;
      color: #fff;
      font-size: 14px;
      border: 1px solid #ffffff59;
      border-radius: 4px;
      z-index: 1;
      transition: all 0.2s;
    }
  </style>
</head>
<body>

  <!-- Audio -->
  <audio id="linkmp3" src="https://aditya-909.github.io/audio/backsound.mp3" preload="auto" class="sembunyi"></audio>

  <!-- Kado -->
  <div id="bgKado">
    <div id="kadoIn">
      <img src="https://irfan-za.github.io/bcn-assets/image/kado.png" id="imgKado" />
    </div>
  </div>

  <!-- Background -->
  <div id="bodyblur">
    <img src="https://irfan-za.github.io/bcn-assets/image/street-moon.jpg" id="bgwallpaper" />
    <canvas id="canvas"></canvas>
  </div>

  <!-- Konten -->
  <div id="content">
    <div class="stickerswrapper">
      <img src="https://irfan-za.github.io/bcn-assets/image/hug.gif" id="fotostiker" />
    </div>

    <div>
      <div id="slider">
        <!-- Slide 1 -->
        <div id="slide1">
          <img src="https://irfan-za.github.io/bcn-assets/image/hello.gif" /><br />
          <b>hei alpaa,tak dudoh i apik 🤭</b>
        </div>
        <!-- Slide 2 -->
        <div id="slide2">
          <img src="https://irfan-za.github.io/bcn-assets/image/no.gif" /><br />
          <b id="sekLah"></b>
        </div>
        <!-- Slide 3 -->
        <div id="slide3">
          <img src="https://irfan-za.github.io/bcn-assets/image/kiss-hug.gif" /><br />
          <b>19 april to iki maeng<br />enek opo yo? 🤔</b>
        </div>
        <!-- Slide 4 -->
        <div id="slide4">
          <img src="https://irfan-za.github.io/bcn-assets/image/kiss.gif" /><br />
          <b id="hbdText"></b>
        </div>
      </div>
    </div>

    <!-- Pesan Akhir -->
    <div>
      <blockquote id="bq">
        <p id="judulAkhir">selamat ulang tahun alpaaku 💝</p>
        <p id="kalimat">
          <span id="klganti">happy birtday yaa alpaa<br /><br /></span>
          di umur yang hampir menginjak kepala orang ini<br />aku mek arep omong<br />
          aku sayang banget sama kamu 😚<br />
          semoga panjang umur &amp; sehat selalu yaa<br /><br />
          <span class="ft">I Love You❤️ cill</span>
        </p>
      </blockquote>
    </div>

    <div id="button">
      <a onClick="multifungsi()">
        <b id="tmbl">Lanjut &#128073;</b>
      </a>
    </div>
  </div>

  <!-- Script Utama -->
  <script>
    const canvas = document.getElementById("canvas");
    canvas.style.display = "none";
    const body = document.querySelector("body");
    const iniwp = [];
    var iden = 1;
    const swals = Swal.mixin({
      timer: 99999,
      allowOutsideClick: false,
      showConfirmButton: true,
      timerProgressBar: false,
      imageHeight: 90,
    });
    var audio = new Audio(document.getElementById("linkmp3").src);
    var ftganti = 0;
    var fungsi = 0;
    var fungsiAwal = 0;
    var deffotostiker = fotostiker.src;
    var sudahklik = true;

    function berjatuhan() {
      const heart = document.createElement("div");
      heart.className = "fas fa-heart";
      heart.style.left = Math.random() * 90 + "vw";
      heart.style.animationDuration = Math.random() * 3 + 2 + "s";
      body.appendChild(heart);
    }
    setInterval(function () {
      var heartArr = document.querySelectorAll(".fa-heart");
      if (heartArr.length > 100) heartArr[0].remove();
    }, 100);

    content.style = "opacity:1;margin-top:14vh";

    const box = document.getElementById("slider");
    const totalSlide = box.children.length;

    function initengahan() {
      content.style = "opacity:1;margin-top:10vh";
      setTimeout(inipesan, 200);
      audio.play();
    }

    var isSliderRunning = false;
    var currentSlide = 1;

    document.getElementById("bodyblur").onclick = function () {
      multifungsi();
    };

    function multifungsi() {
      if (isSliderRunning) {
        if (currentSlide == totalSlide) {
          document.getElementById("bgwallpaper").style.display = "none";
          document.getElementById("bodyblur").style.backgroundColor = "pink";
          canvas.style.display = "inline";
          aksiakhir();
        }
        document.getElementById("slider").scrollLeft += 300;
        hsementara();
      }
      if (currentSlide == 100) {
        button.style = "";
        // setTimeout(aksibalas, 150);
      }
    }

    async function inipesan() {
      var nama = "Kamu";
      window.nama = nama;
      mulainama();
    }

    async function mulainama() {
      setTimeout(pgmuncul, 200);
    }

    function hsementara() {
      button.style = "";
      currentSlide += 1;
      isSliderRunning = false;
      setTimeout(munculkembali, 700);
      if (currentSlide === 2) runPesan2();
      if (currentSlide === 3) runPesan3();
    }

    let vketik2 = "sek paa";
    function runPesan2() {
      new TypeIt("#sekLah", {
        strings: ["" + vketik2],
        startDelay: 20,
        speed: 40,
        cursor: true,
        deleteSpeed: 50,
        breakLines: false,
        waitUntilVisible: true,
        lifelike: true,
        afterComplete: function () { multifungsi(); },
      }).go();
    }

    let vketik3 = "17 tahun tenan?😝🥳";
    function runPesan3() {
      new TypeIt("#hbdText", {
        strings: ["" + vketik3],
        startDelay: 20,
        speed: 40,
        cursor: true,
        deleteSpeed: 50,
        breakLines: false,
        waitUntilVisible: true,
        lifelike: true,
        afterComplete: function () { multifungsi(); },
      }).go();
    }

    function munculkembali() {
      if (currentSlide <= totalSlide) {
        button.style = "opacity:1;transform: scale(1)";
        isSliderRunning = true;
      }
      if (currentSlide == 50) {
        tmbl.innerHTML = "💌 Balas";
        button.style = "opacity:1;transform: scale(1)";
        currentSlide = 100;
      }
    }

    function aksiakhir() {
      slider.style = "position:relative;";
      button.style = "";
      setTimeout(bqmuncul, 500);
    }

    function kalimatakhir() {
      new TypeIt("#kalimat", {
        strings: ["" + katakata],
        startDelay: 50,
        speed: 54,
        cursor: true,
        afterComplete: function () {
          kalimat.innerHTML = katakata;
          setTimeout(munculjudulAkhir, 300);
        },
      }).go();
    }

    function munculjudulAkhir() {
      klganti.style = "display:none";
      judulAkhir.style = "position:relative;opacity:1;transform:scale(1);";
      setTimeout(jjjudulAkhir, 550);
      setInterval(berjatuhan, 250);
    }

    function jjjudulAkhir() {
      judulAkhir.style.animation = "rto .8s infinite alternate";
    }

    function ftmuncul() {
      if (ftganti == 0) fotostiker.src = deffotostiker;
      if (ftganti <= 10) {
        fotostiker.style = "display:inline-flex;opacity:1;transform:scale(1)";
      }
    }

    function fthilang() {
      fotostiker.style = "display:inline-flex;opacity:0;transform:scale(0)";
      if (ftganti < 10) setTimeout(ftmuncul, 250);
    }

    function pgmuncul() {
      slider.style = "position:relative;opacity:1;transform:scale(1);";
      setTimeout(munculkembali, 500);
    }

    function bqmuncul() {
      katakata = kalimat.innerHTML;
      kalimat.innerHTML = "";
      content.style = "opacity:1;margin-top:8vh";
      fotostiker.style = "display:none";
      slider.style = "display:none";
      button.style = "";
      bq.style = "position:relative;opacity:1;visibility:visible;margin-top:5vh;transform: scale(1);";
      setTimeout(kalimatakhir, 200);
      ftganti = 0;
      fthilang();
    }

    function bqhilang() {
      bgwallpaper.style = "transform: scale(2);";
      bodyblur.style = "opacity:.3";
      bq.style = "position:relative;transition:all .7s ease;";
    }
  </script>

  <!-- ✅ Onclick Kado - Di luar module agar selalu berfungsi -->
  <script>
    document.getElementById("kadoIn").onclick = function () {
      kadoIn.style = "transition:all .8s ease;transform:scale(10);opacity:0;";
      if (sudahklik == true && fungsiAwal == 0) {
        fungsiAwal = 1;
        setTimeout(() => {
          initengahan();
          document.getElementById("bgKado").style = "display:none;";
        }, 300);
      }
    };
  </script>
